  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

eyframes riseIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"font-family: 'DM Sans', system-ui, sans-serif; color: #11201c; background: #f4f6f3; -webkit-font-smoothing: antialiased; overflow-x: hidden;\">\n\n  <!-- ============ NAV ============ -->\n  <nav style=\"position: sticky; top: 0; z-index: 50; display: flex; align-items: center; justify-content: space-between; padding: 14px 30px; background: rgba(244,246,243,0.82); backdrop-filter: blur(14px); border-bottom: 1px solid #e3e8e2;\">\n    <div style=\"display: flex; align-items: center; gap: 11px;\">\n      <div style=\"width: 30px; height: 30px; border-radius: 8px; background: #0c7d5a; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 10px rgba(12,125,90,0.28);\">\n        <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M13 2 L4 14 h6 l-1 8 9-12 h-6 z\"><\u002Fpath><\u002Fsvg>\n      <\u002Fdiv>\n      <span style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 17px; letter-spacing: -0.01em;\">GOPACS<\u002Fspan>\n      <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; color: #8a978f; letter-spacing: 0.05em; padding: 3px 8px; border: 1px solid #dde3dc; border-radius: 6px;\">EXPLAINED<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display: flex; align-items: center; gap: 4px; font-size: 13px; font-weight: 500;\">\n      <a href=\"#problem\" style=\"color: #5f6f69; text-decoration: none; padding: 7px 12px; border-radius: 8px;\">The problem<\u002Fa>\n      <a href=\"#process\" style=\"color: #5f6f69; text-decoration: none; padding: 7px 12px; border-radius: 8px;\">7 steps<\u002Fa>\n      <a href=\"#roles\" style=\"color: #5f6f69; text-decoration: none; padding: 7px 12px; border-radius: 8px;\">Roles<\u002Fa>\n      <a href=\"#contracts\" style=\"color: #5f6f69; text-decoration: none; padding: 7px 12px; border-radius: 8px;\">Contracts<\u002Fa>\n      <a href=\"#negoflex\" style=\"color: #ffffff; text-decoration: none; padding: 7px 14px; border-radius: 8px; background: #11201c; font-weight: 600;\">Your building<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fnav>\n\n  <!-- ============ HERO ============ -->\n  <header data-screen-label=\"Hero\" style=\"position: relative; padding: 92px 30px 64px; max-width: 1140px; margin: 0 auto; overflow: hidden;\">\n    <div style=\"position: absolute; inset: 0; background-image: linear-gradient(#e6ebe5 1px, transparent 1px), linear-gradient(90deg, #e6ebe5 1px, transparent 1px); background-size: 46px 46px; -webkit-mask-image: radial-gradient(ellipse 70% 60% at 70% 30%, #000 0%, transparent 75%); mask-image: radial-gradient(ellipse 70% 60% at 70% 30%, #000 0%, transparent 75%); pointer-events: none;\"><\u002Fdiv>\n    <div style=\"position: relative; max-width: 760px;\">\n      <div style=\"display: inline-flex; align-items: center; gap: 9px; padding: 6px 13px; border-radius: 100px; background: #e6f3ed; border: 1px solid #cce5da; margin-bottom: 26px;\">\n        <span style=\"width: 7px; height: 7px; border-radius: 50%; background: #0c7d5a; animation: softGlow 2.4s ease-in-out infinite;\"><\u002Fspan>\n        <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.06em; color: #0c7d5a; font-weight: 500;\">DUTCH GRID CONGESTION MANAGEMENT<\u002Fspan>\n      <\u002Fdiv>\n      <h1 style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 58px; line-height: 1.02; letter-spacing: -0.03em; margin-bottom: 22px; text-wrap: balance;\">Your building can help fix the grid — and get paid for it.<\u002Fh1>\n      <p style=\"font-size: 19px; line-height: 1.55; color: #4f5f59; max-width: 620px; text-wrap: pretty;\">GOPACS is the shared platform that all Dutch grid operators use to solve <strong style=\"color: #11201c; font-weight: 600;\">local grid congestion<\u002Fstrong> with the market instead of switching customers off. Here's how it works — and where flexible buildings like yours fit in.<\u002Fp>\n      <div style=\"display: flex; flex-wrap: wrap; gap: 32px; margin-top: 42px;\">\n        <div>\n          <div style=\"font-family: 'Space Grotesk', sans-serif; font-size: 34px; font-weight: 700; letter-spacing: -0.02em; color: #0c7d5a;\">7<\u002Fdiv>\n          <div style=\"font-size: 13px; color: #6b7a73; margin-top: 2px;\">step process<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"width: 1px; background: #dde3dc;\"><\u002Fdiv>\n        <div>\n          <div style=\"font-family: 'Space Grotesk', sans-serif; font-size: 34px; font-weight: 700; letter-spacing: -0.02em; color: #11201c;\">TenneT<span style=\"color: #b7c1b9;\"> + <\u002Fspan>6<\u002Fdiv>\n          <div style=\"font-size: 13px; color: #6b7a73; margin-top: 2px;\">grid operators (DSOs)<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"width: 1px; background: #dde3dc;\"><\u002Fdiv>\n        <div>\n          <div style=\"font-family: 'Space Grotesk', sans-serif; font-size: 34px; font-weight: 700; letter-spacing: -0.02em; color: #11201c;\">3<\u002Fdiv>\n          <div style=\"font-size: 13px; color: #6b7a73; margin-top: 2px;\">trading venues used<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ============ THE PROBLEM ============ -->\n  <section id=\"problem\" data-screen-label=\"The Problem\" style=\"max-width: 1140px; margin: 0 auto; padding: 48px 30px 56px;\">\n    <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 0.08em; color: #0c7d5a; margin-bottom: 14px;\">01 / THE CORE PROBLEM<\u002Fdiv>\n    <h2 style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 38px; letter-spacing: -0.025em; line-height: 1.08; max-width: 720px; margin-bottom: 16px; text-wrap: balance;\">A building can be perfect for the energy market and a problem for the local grid — at the very same moment.<\u002Fh2>\n    <p style=\"font-size: 16.5px; line-height: 1.6; color: #4f5f59; max-width: 660px; margin-bottom: 40px; text-wrap: pretty;\">National energy prices answer <em>\"is power scarce in the country?\"<\u002Fem> Grid capacity answers <em>\"is this specific cable overloaded?\"<\u002Fem> These two signals can point in opposite directions.<\u002Fp>\n\n    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 20px;\">\n      <!-- price signal -->\n      <div style=\"background: #fff; border: 1px solid #e3e8e2; border-radius: 16px; padding: 28px; box-shadow: 0 1px 2px rgba(17,32,28,0.03);\">\n        <div style=\"display: flex; align-items: center; gap: 10px; margin-bottom: 16px;\">\n          <div style=\"width: 34px; height: 34px; border-radius: 9px; background: #e8eff6; display: flex; align-items: center; justify-content: center;\">\n            <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#2c63a0\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"12\" y1=\"1\" x2=\"12\" y2=\"23\"><\u002Fline><path d=\"M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <h3 style=\"font-family: 'Space Grotesk', sans-serif; font-size: 17px; font-weight: 600;\">The energy price says…<\u002Fh3>\n        <\u002Fdiv>\n        <div style=\"font-size: 15px; line-height: 1.55; color: #4f5f59; margin-bottom: 18px;\">Midday solar floods the country. Day-ahead prices crash. Your building management system happily wants to <strong style=\"color: #2c63a0;\">consume more<\u002Fstrong> cheap power.<\u002Fdiv>\n        <div style=\"display: flex; align-items: flex-end; gap: 5px; height: 64px; padding: 12px 0; border-top: 1px dashed #e3e8e2;\">\n          <div style=\"flex: 1; height: 70%; background: #cdddf0; border-radius: 3px 3px 0 0;\"><\u002Fdiv>\n          <div style=\"flex: 1; height: 45%; background: #cdddf0; border-radius: 3px 3px 0 0;\"><\u002Fdiv>\n          <div style=\"flex: 1; height: 22%; background: #9cc0e8; border-radius: 3px 3px 0 0;\"><\u002Fdiv>\n          <div style=\"flex: 1; height: 12%; background: #2c63a0; border-radius: 3px 3px 0 0;\"><\u002Fdiv>\n          <div style=\"flex: 1; height: 10%; background: #2c63a0; border-radius: 3px 3px 0 0;\"><\u002Fdiv>\n          <div style=\"flex: 1; height: 24%; background: #9cc0e8; border-radius: 3px 3px 0 0;\"><\u002Fdiv>\n          <div style=\"flex: 1; height: 52%; background: #cdddf0; border-radius: 3px 3px 0 0;\"><\u002Fdiv>\n          <div style=\"flex: 1; height: 68%; background: #cdddf0; border-radius: 3px 3px 0 0;\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; color: #8a978f; display: flex; justify-content: space-between; margin-top: 6px;\"><span>06:00<\u002Fspan><span>SOLAR NOON · CHEAP<\u002Fspan><span>20:00<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- grid signal -->\n      <div style=\"background: #fff; border: 1px solid #e3e8e2; border-radius: 16px; padding: 28px; box-shadow: 0 1px 2px rgba(17,32,28,0.03);\">\n        <div style=\"display: flex; align-items: center; gap: 10px; margin-bottom: 16px;\">\n          <div style=\"width: 34px; height: 34px; border-radius: 9px; background: #fbede0; display: flex; align-items: center; justify-content: center;\">\n            <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#d97b2e\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z\"><\u002Fpath><line x1=\"12\" y1=\"9\" x2=\"12\" y2=\"13\"><\u002Fline><line x1=\"12\" y1=\"17\" x2=\"12.01\" y2=\"17\"><\u002Fline><\u002Fsvg>\n          <\u002Fdiv>\n          <h3 style=\"font-family: 'Space Grotesk', sans-serif; font-size: 17px; font-weight: 600;\">The local grid says…<\u002Fh3>\n        <\u002Fdiv>\n        <div style=\"font-size: 15px; line-height: 1.55; color: #4f5f59; margin-bottom: 18px;\">That same feeder is already <strong style=\"color: #d97b2e;\">full in the export direction<\u002Fstrong>. One more kilowatt and the cable overloads. The grid needs you to <strong style=\"color: #d97b2e;\">pull back<\u002Fstrong>.<\u002Fdiv>\n        <div style=\"position: relative; height: 64px; padding: 12px 0; border-top: 1px dashed #e3e8e2;\">\n          <div style=\"position: absolute; left: 0; right: 0; top: 20px; height: 2px; background: #d97b2e; opacity: 0.4;\"><\u002Fdiv>\n          <div style=\"position: absolute; left: 0; right: 0; top: 17px; font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: #d97b2e; text-align: right;\">CABLE LIMIT<\u002Fdiv>\n          <div style=\"display: flex; align-items: flex-end; gap: 5px; height: 100%;\">\n            <div style=\"flex: 1; height: 35%; background: #f3d4b8; border-radius: 3px 3px 0 0;\"><\u002Fdiv>\n            <div style=\"flex: 1; height: 60%; background: #f3d4b8; border-radius: 3px 3px 0 0;\"><\u002Fdiv>\n            <div style=\"flex: 1; height: 88%; background: #e8a565; border-radius: 3px 3px 0 0;\"><\u002Fdiv>\n            <div style=\"flex: 1; height: 100%; background: #d97b2e; border-radius: 3px 3px 0 0;\"><\u002Fdiv>\n            <div style=\"flex: 1; height: 100%; background: #d97b2e; border-radius: 3px 3px 0 0;\"><\u002Fdiv>\n            <div style=\"flex: 1; height: 82%; background: #e8a565; border-radius: 3px 3px 0 0;\"><\u002Fdiv>\n            <div style=\"flex: 1; height: 48%; background: #f3d4b8; border-radius: 3px 3px 0 0;\"><\u002Fdiv>\n            <div style=\"flex: 1; height: 30%; background: #f3d4b8; border-radius: 3px 3px 0 0;\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; color: #8a978f; display: flex; justify-content: space-between; margin-top: 6px;\"><span>06:00<\u002Fspan><span>FEEDER OVERLOADED<\u002Fspan><span>20:00<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display: flex; align-items: center; gap: 16px; margin-top: 22px; padding: 20px 24px; background: #11201c; border-radius: 14px; color: #e8ede9;\">\n      <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#7fd3b3\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex-shrink:0;\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M12 16v-4M12 8h.01\"><\u002Fpath><\u002Fsvg>\n      <p style=\"font-size: 15.5px; line-height: 1.5;\"><strong style=\"color: #fff;\">GOPACS pays to resolve exactly this conflict.<\u002Fstrong> It's a separate market layer for grid capacity (MW on a specific line) that sits underneath the national energy market (€/MWh for the whole country).<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ TIMELINE ============ -->\n  <section data-screen-label=\"Market Timeline\" style=\"background: #11201c; color: #e8ede9; padding: 64px 30px;\">\n    <div style=\"max-width: 1140px; margin: 0 auto;\">\n      <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 0.08em; color: #7fd3b3; margin-bottom: 14px;\">02 / WHERE GOPACS SITS<\u002Fdiv>\n      <h2 style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 36px; letter-spacing: -0.025em; line-height: 1.1; max-width: 680px; margin-bottom: 12px; color: #fff; text-wrap: balance;\">The market refines the plan from years ahead down to real time.<\u002Fh2>\n      <p style=\"font-size: 16px; line-height: 1.6; color: #9fb0a8; max-width: 620px; margin-bottom: 44px;\">GOPACS doesn't replace any of these markets. It's a congestion layer underneath them — and the law says grid operators must try the market <em>before<\u002Fem> switching anyone off.<\u002Fp>\n\n      <div style=\"display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; position: relative;\">\n        <div style=\"position: absolute; top: 18px; left: 6%; right: 6%; height: 2px; background: linear-gradient(90deg, #2c4a40, #0c7d5a); opacity: 0.6;\"><\u002Fdiv>\n        <div style=\"position: relative;\">\n          <div style=\"width: 14px; height: 14px; border-radius: 50%; background: #11201c; border: 2px solid #5f7068; margin-bottom: 18px; position: relative; z-index: 2;\"><\u002Fdiv>\n          <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #6f8077; letter-spacing: 0.05em; margin-bottom: 7px;\">YEARS – MONTHS<\u002Fdiv>\n          <div style=\"font-family: 'Space Grotesk', sans-serif; font-size: 16px; font-weight: 600; color: #fff; margin-bottom: 6px;\">Forward &amp; futures<\u002Fdiv>\n          <div style=\"font-size: 13px; line-height: 1.5; color: #9fb0a8;\">Hedge price risk up to ~13 years ahead on ICE Endex.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"position: relative;\">\n          <div style=\"width: 14px; height: 14px; border-radius: 50%; background: #11201c; border: 2px solid #5f7068; margin-bottom: 18px; position: relative; z-index: 2;\"><\u002Fdiv>\n          <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #6f8077; letter-spacing: 0.05em; margin-bottom: 7px;\">12:00 D-1<\u002Fdiv>\n          <div style=\"font-family: 'Space Grotesk', sans-serif; font-size: 16px; font-weight: 600; color: #fff; margin-bottom: 6px;\">Day-ahead auction<\u002Fdiv>\n          <div style=\"font-size: 13px; line-height: 1.5; color: #9fb0a8;\">Sets the reference price &amp; schedule per 15-min block.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"position: relative;\">\n          <div style=\"width: 14px; height: 14px; border-radius: 50%; background: #11201c; border: 2px solid #5f7068; margin-bottom: 18px; position: relative; z-index: 2;\"><\u002Fdiv>\n          <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #6f8077; letter-spacing: 0.05em; margin-bottom: 7px;\">UNTIL 5 MIN BEFORE<\u002Fdiv>\n          <div style=\"font-family: 'Space Grotesk', sans-serif; font-size: 16px; font-weight: 600; color: #fff; margin-bottom: 6px;\">Intraday<\u002Fdiv>\n          <div style=\"font-size: 13px; line-height: 1.5; color: #9fb0a8;\">Continuous trading + IDA1–3 correct for new forecasts.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"position: relative;\">\n          <div style=\"width: 14px; height: 14px; border-radius: 50%; background: #11201c; border: 2px solid #7fd3b3; margin-bottom: 18px; position: relative; z-index: 2; box-shadow: 0 0 0 4px rgba(127,211,179,0.15);\"><\u002Fdiv>\n          <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #6f8077; letter-spacing: 0.05em; margin-bottom: 7px;\">REAL TIME<\u002Fdiv>\n          <div style=\"font-family: 'Space Grotesk', sans-serif; font-size: 16px; font-weight: 600; color: #fff; margin-bottom: 6px;\">Balancing<\u002Fdiv>\n          <div style=\"font-size: 13px; line-height: 1.5; color: #9fb0a8;\">TenneT activates FCR / aFRR / mFRR reserves.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"position: relative;\">\n          <div style=\"width: 14px; height: 14px; border-radius: 50%; background: #11201c; border: 2px solid #5f7068; margin-bottom: 18px; position: relative; z-index: 2;\"><\u002Fdiv>\n          <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #6f8077; letter-spacing: 0.05em; margin-bottom: 7px;\">EX-POST · D+1<\u002Fdiv>\n          <div style=\"font-family: 'Space Grotesk', sans-serif; font-size: 16px; font-weight: 600; color: #fff; margin-bottom: 6px;\">Settlement<\u002Fdiv>\n          <div style=\"font-size: 13px; line-height: 1.5; color: #9fb0a8;\">Imbalance settled per 15 min; after-market to 08:30.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- GOPACS layer underneath -->\n      <div style=\"margin-top: 38px; padding: 24px 28px; border: 1.5px solid #0c7d5a; border-radius: 16px; background: linear-gradient(180deg, rgba(12,125,90,0.12), rgba(12,125,90,0.04)); display: flex; align-items: center; gap: 24px; flex-wrap: wrap;\">\n        <div style=\"display: flex; align-items: center; gap: 13px;\">\n          <div style=\"width: 38px; height: 38px; border-radius: 10px; background: #0c7d5a; display: flex; align-items: center; justify-content: center;\">\n            <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M13 2 L4 14 h6 l-1 8 9-12 h-6 z\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-family: 'Space Grotesk', sans-serif; font-size: 18px; font-weight: 700; color: #fff;\">GOPACS — the congestion layer<\u002Fdiv>\n            <div style=\"font-size: 13px; color: #9fb0a8;\">Runs across all of the above, on the same intraday venues<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex: 1; min-width: 280px; font-size: 14.5px; line-height: 1.55; color: #c3d0c9;\">Same-day congestion is solved here using <strong style=\"color: #7fd3b3;\">IDCONS<\u002Fstrong> — without conflicting with the energy positions already set in the markets above. One flexible asset can stack revenue across all these layers.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ WHAT IS GOPACS ============ -->\n  <section data-screen-label=\"What GOPACS Is\" style=\"max-width: 1140px; margin: 0 auto; padding: 64px 30px 40px;\">\n    <div style=\"display: grid; grid-template-columns: 0.85fr 1.15fr; gap: 48px; align-items: start;\">\n      <div>\n        <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 0.08em; color: #0c7d5a; margin-bottom: 14px;\">03 / WHAT IT ACTUALLY IS<\u002Fdiv>\n        <h2 style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 34px; letter-spacing: -0.025em; line-height: 1.1; margin-bottom: 18px; text-wrap: balance;\">Not an exchange. A smart overlay on the ones that exist.<\u002Fh2>\n        <p style=\"font-size: 16px; line-height: 1.6; color: #4f5f59; margin-bottom: 16px;\">GOPACS = <strong>G<\u002Fstrong>rid <strong>O<\u002Fstrong>perators <strong>P<\u002Fstrong>latform for <strong>A<\u002Fstrong>ncillary <strong>S<\u002Fstrong>ervices. It adds <em>location awareness<\u002Fem> to normal trading venues, tagging orders by their EAN connection code so it knows which assets sit inside an overloaded area.<\u002Fp>\n        <p style=\"font-size: 16px; line-height: 1.6; color: #4f5f59;\">It resolves the local overload while keeping the national energy balance completely unchanged.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display: flex; flex-direction: column; gap: 14px;\">\n        <div style=\"background: #fff; border: 1px solid #e3e8e2; border-radius: 14px; padding: 22px 24px; box-shadow: 0 1px 2px rgba(17,32,28,0.03);\">\n          <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #2c63a0; letter-spacing: 0.05em; margin-bottom: 8px;\">SITS ON TOP OF<\u002Fdiv>\n          <div style=\"display: flex; gap: 10px; flex-wrap: wrap;\">\n            <span style=\"padding: 8px 16px; background: #e8eff6; border-radius: 9px; font-weight: 600; font-size: 14px; color: #2c63a0;\">ETPA<\u002Fspan>\n            <span style=\"padding: 8px 16px; background: #e8eff6; border-radius: 9px; font-weight: 600; font-size: 14px; color: #2c63a0;\">EPEX SPOT<\u002Fspan>\n            <span style=\"padding: 8px 16px; background: #e8eff6; border-radius: 9px; font-weight: 600; font-size: 14px; color: #2c63a0;\">Nord Pool<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 14px;\">\n          <div style=\"background: #fff; border: 1px solid #e3e8e2; border-radius: 14px; padding: 20px 22px; box-shadow: 0 1px 2px rgba(17,32,28,0.03);\">\n            <div style=\"display: flex; align-items: center; gap: 8px; margin-bottom: 9px;\">\n              <span style=\"width: 8px; height: 8px; border-radius: 2px; background: #0c7d5a;\"><\u002Fspan>\n              <span style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 14.5px;\">Firm layer<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"font-size: 13.5px; line-height: 1.5; color: #5f6f69;\">The <strong style=\"color:#11201c;\">CSP<\u002Fstrong> holds the binding contract with the grid and must deliver.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background: #fff; border: 1px solid #e3e8e2; border-radius: 14px; padding: 20px 22px; box-shadow: 0 1px 2px rgba(17,32,28,0.03);\">\n            <div style=\"display: flex; align-items: center; gap: 8px; margin-bottom: 9px;\">\n              <span style=\"width: 8px; height: 8px; border-radius: 2px; background: #d97b2e;\"><\u002Fspan>\n              <span style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 14.5px;\">Promise layer<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"font-size: 13.5px; line-height: 1.5; color: #5f6f69;\">Your <strong style=\"color:#11201c;\">building<\u002Fstrong> offers flexibility — voluntary, comfort-bound, trust-based.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 7 STEP PROCESS ============ -->\n  <section id=\"process\" data-screen-label=\"7-Step Process\" style=\"max-width: 1140px; margin: 0 auto; padding: 56px 30px 40px;\">\n    <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 0.08em; color: #0c7d5a; margin-bottom: 14px;\">04 / THE PROCESS<\u002Fdiv>\n    <h2 style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 38px; letter-spacing: -0.025em; line-height: 1.08; margin-bottom: 14px;\">From overloaded cable to settled payment, in seven steps.<\u002Fh2>\n    <p style=\"font-size: 16px; line-height: 1.6; color: #4f5f59; max-width: 620px; margin-bottom: 34px;\">Tap any step to see what happens — and who's responsible.<\u002Fp>\n\n    <div style=\"display: grid; grid-template-columns: 320px 1fr; gap: 28px; align-items: start;\">\n      <!-- step rail -->\n      <div style=\"display: flex; flex-direction: column; gap: 6px;\">\n        <button onclick=\"{{ go1 }}\" style=\"{{ nav1 }}\" style-hover=\"border-color:#bcd6cb;\">\n          <span style=\"display:flex;align-items:center;gap:13px;width:100%;text-align:left;\">\n            <span style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;width:22px;flex-shrink:0;\">01<\u002Fspan>\n            <span style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14.5px;\">Congestion identified<\u002Fspan>\n          <\u002Fspan>\n        <\u002Fbutton>\n        <button onclick=\"{{ go2 }}\" style=\"{{ nav2 }}\" style-hover=\"border-color:#bcd6cb;\">\n          <span style=\"display:flex;align-items:center;gap:13px;width:100%;text-align:left;\">\n            <span style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;width:22px;flex-shrink:0;\">02<\u002Fspan>\n            <span style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14.5px;\">Notification published<\u002Fspan>\n          <\u002Fspan>\n        <\u002Fbutton>\n        <button onclick=\"{{ go3 }}\" style=\"{{ nav3 }}\" style-hover=\"border-color:#bcd6cb;\">\n          <span style=\"display:flex;align-items:center;gap:13px;width:100%;text-align:left;\">\n            <span style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;width:22px;flex-shrink:0;\">03<\u002Fspan>\n            <span style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14.5px;\">Request sent to venues<\u002Fspan>\n          <\u002Fspan>\n        <\u002Fbutton>\n        <button onclick=\"{{ go4 }}\" style=\"{{ nav4 }}\" style-hover=\"border-color:#bcd6cb;\">\n          <span style=\"display:flex;align-items:center;gap:13px;width:100%;text-align:left;\">\n            <span style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;width:22px;flex-shrink:0;\">04<\u002Fspan>\n            <span style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14.5px;\">Bids submitted<\u002Fspan>\n          <\u002Fspan>\n        <\u002Fbutton>\n        <button onclick=\"{{ go5 }}\" style=\"{{ nav5 }}\" style-hover=\"border-color:#bcd6cb;\">\n          <span style=\"display:flex;align-items:center;gap:13px;width:100%;text-align:left;\">\n            <span style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;width:22px;flex-shrink:0;\">05<\u002Fspan>\n            <span style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14.5px;\">Matched via IDCONS<\u002Fspan>\n          <\u002Fspan>\n        <\u002Fbutton>\n        <button onclick=\"{{ go6 }}\" style=\"{{ nav6 }}\" style-hover=\"border-color:#bcd6cb;\">\n          <span style=\"display:flex;align-items:center;gap:13px;width:100%;text-align:left;\">\n            <span style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;width:22px;flex-shrink:0;\">06<\u002Fspan>\n            <span style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14.5px;\">Activation &amp; delivery<\u002Fspan>\n          <\u002Fspan>\n        <\u002Fbutton>\n        <button onclick=\"{{ go7 }}\" style=\"{{ nav7 }}\" style-hover=\"border-color:#bcd6cb;\">\n          <span style=\"display:flex;align-items:center;gap:13px;width:100%;text-align:left;\">\n            <span style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;width:22px;flex-shrink:0;\">07<\u002Fspan>\n            <span style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14.5px;\">Verify &amp; settle<\u002Fspan>\n          <\u002Fspan>\n        <\u002Fbutton>\n      <\u002Fdiv>\n\n      <!-- detail panel -->\n      <div style=\"background: #fff; border: 1px solid #e3e8e2; border-radius: 18px; padding: 36px; min-height: 360px; box-shadow: 0 4px 24px rgba(17,32,28,0.05); position: relative; overflow: hidden;\">\n        <div style=\"position:absolute;top:-30px;right:-20px;font-family:'Space Grotesk',sans-serif;font-size:200px;font-weight:700;color:#f1f4f0;line-height:1;user-select:none;pointer-events:none;\">{{ step }}<\u002Fdiv>\n        <sc-if value=\"{{ s1 }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"position:relative;animation:riseIn .4s ease;\">\n            <div style=\"display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.06em;color:#2c63a0;background:#e8eff6;padding:5px 11px;border-radius:7px;margin-bottom:18px;\">GRID-SECURITY STEP · BY THE GRID OPERATOR<\u002Fdiv>\n            <h3 style=\"font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;letter-spacing:-0.02em;margin-bottom:14px;\">Congestion is identified<\u002Fh3>\n            <p style=\"font-size:16px;line-height:1.65;color:#4f5f59;margin-bottom:22px;max-width:560px;\">TenneT or a DSO continuously forecasts how loaded each grid element will be. When a line is heading past its safe limit in a future time window, they flag it — long before anything breaks.<\u002Fp>\n            <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:520px;\">\n              <div style=\"padding:14px 16px;background:#f6f8f5;border-radius:11px;\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#8a978f;margin-bottom:4px;\">DEFINES<\u002Fdiv><div style=\"font-size:14px;font-weight:600;\">Location &amp; direction<\u002Fdiv><\u002Fdiv>\n              <div style=\"padding:14px 16px;background:#f6f8f5;border-radius:11px;\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#8a978f;margin-bottom:4px;\">DEFINES<\u002Fdiv><div style=\"font-size:14px;font-weight:600;\">Time window &amp; MW needed<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"margin-top:20px;font-size:14px;color:#6b7a73;font-style:italic;\">It's purely a grid problem here — the energy market may be running perfectly fine.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ s2 }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"position:relative;animation:riseIn .4s ease;\">\n            <div style=\"display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.06em;color:#2c63a0;background:#e8eff6;padding:5px 11px;border-radius:7px;margin-bottom:18px;\">BY THE GRID OPERATOR<\u002Fdiv>\n            <h3 style=\"font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;letter-spacing:-0.02em;margin-bottom:14px;\">A market message is published<\u002Fh3>\n            <p style=\"font-size:16px;line-height:1.65;color:#4f5f59;margin-bottom:22px;max-width:560px;\">The technical bottleneck becomes a structured market request. The operator now formally expresses <em>demand<\u002Fem> for relief — issued as early as the day before (D-1) and pushed out through every channel.<\u002Fp>\n            <div style=\"display:flex;flex-wrap:wrap;gap:9px;max-width:520px;\">\n              <span style=\"padding:9px 15px;background:#f6f8f5;border-radius:9px;font-size:13.5px;font-weight:500;\">Congestion area<\u002Fspan>\n              <span style=\"padding:9px 15px;background:#f6f8f5;border-radius:9px;font-size:13.5px;font-weight:500;\">Offtake or feed-in?<\u002Fspan>\n              <span style=\"padding:9px 15px;background:#f6f8f5;border-radius:9px;font-size:13.5px;font-weight:500;\">Time window<\u002Fspan>\n              <span style=\"padding:9px 15px;background:#f6f8f5;border-radius:9px;font-size:13.5px;font-weight:500;\">Volume (MW)<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"margin-top:20px;font-size:14px;color:#6b7a73;\">Distributed via the GOPACS website, API, email, and direct CSP notifications.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ s3 }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"position:relative;animation:riseIn .4s ease;\">\n            <div style=\"display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.06em;color:#0c7d5a;background:#e6f3ed;padding:5px 11px;border-radius:7px;margin-bottom:18px;\">BY GOPACS<\u002Fdiv>\n            <h3 style=\"font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;letter-spacing:-0.02em;margin-bottom:14px;\">Forwarded to the trading venues<\u002Fh3>\n            <p style=\"font-size:16px;line-height:1.65;color:#4f5f59;margin-bottom:22px;max-width:560px;\">GOPACS passes the request to the connected platforms. It's the coordination &amp; matching layer — the actual orders still live on the regular exchanges. No duplicate trading floor.<\u002Fp>\n            <div style=\"display:flex;gap:10px;\">\n              <span style=\"padding:10px 18px;background:#e8eff6;border-radius:10px;font-weight:600;font-size:14.5px;color:#2c63a0;\">ETPA<\u002Fspan>\n              <span style=\"padding:10px 18px;background:#e8eff6;border-radius:10px;font-weight:600;font-size:14.5px;color:#2c63a0;\">EPEX SPOT<\u002Fspan>\n              <span style=\"padding:10px 18px;background:#e8eff6;border-radius:10px;font-weight:600;font-size:14.5px;color:#2c63a0;\">Nord Pool<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"margin-top:20px;font-size:14px;color:#6b7a73;font-style:italic;\">GOPACS adds location-awareness to existing markets rather than rebuilding them.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ s4 }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"position:relative;animation:riseIn .4s ease;\">\n            <div style=\"display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.06em;color:#d97b2e;background:#fbede0;padding:5px 11px;border-radius:7px;margin-bottom:18px;\">BY THE CSP — ON BEHALF OF YOUR BUILDING<\u002Fdiv>\n            <h3 style=\"font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;letter-spacing:-0.02em;margin-bottom:14px;\">Bids are submitted<\u002Fh3>\n            <p style=\"font-size:16px;line-height:1.65;color:#4f5f59;margin-bottom:22px;max-width:560px;\">A Congestion Service Provider submits offers tagged with each asset's <strong>EAN code<\u002Fstrong> — so GOPACS knows whether it sits <em>inside<\u002Fem> or <em>outside<\u002Fem> the congested area. Direction is everything.<\u002Fp>\n            <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:540px;\">\n              <div style=\"padding:16px;background:#fbede0;border-radius:12px;\"><div style=\"font-weight:700;font-size:14.5px;color:#d97b2e;margin-bottom:5px;\">Export area is full<\u002Fdiv><div style=\"font-size:13.5px;line-height:1.45;color:#5f6f69;\">→ consume more, or generate less<\u002Fdiv><\u002Fdiv>\n              <div style=\"padding:16px;background:#e8eff6;border-radius:12px;\"><div style=\"font-weight:700;font-size:14.5px;color:#2c63a0;margin-bottom:5px;\">Import area is full<\u002Fdiv><div style=\"font-size:13.5px;line-height:1.45;color:#5f6f69;\">→ consume less, or generate more<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"margin-top:20px;font-size:14px;color:#6b7a73;font-style:italic;\">The same battery or HVAC can be \"up-flex\" or \"down-flex\" depending on the situation.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ s5 }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"position:relative;animation:riseIn .4s ease;\">\n            <div style=\"display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.06em;color:#0c7d5a;background:#e6f3ed;padding:5px 11px;border-radius:7px;margin-bottom:18px;\">THE CORE MECHANISM · IDCONS<\u002Fdiv>\n            <h3 style=\"font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;letter-spacing:-0.02em;margin-bottom:14px;\">Paired &amp; matched<\u002Fh3>\n            <p style=\"font-size:16px;line-height:1.65;color:#4f5f59;margin-bottom:18px;max-width:560px;\">Every buy order <em>inside<\u002Fem> the congested area is paired with an equal sell order <em>outside<\u002Fem> it (or vice-versa). Congestion is relieved while total energy stays balanced. GOPACS finds the pair with the <strong>smallest price spread<\u002Fstrong>.<\u002Fp>\n            <div style=\"font-size:14.5px;line-height:1.55;color:#11201c;padding:16px 18px;background:#f6f8f5;border-radius:12px;max-width:560px;border-left:3px solid #0c7d5a;\">It's <strong>pay-as-bid<\u002Fstrong>, not one clearing price. GOPACS isn't buying electricity — it's buying a <strong>change in where power flows<\u002Fstrong>.<\u002Fdiv>\n            <div style=\"margin-top:18px;font-size:14px;color:#0c7d5a;font-weight:600;\">↓ See the full IDCONS diagram below<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ s6 }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"position:relative;animation:riseIn .4s ease;\">\n            <div style=\"display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.06em;color:#d97b2e;background:#fbede0;padding:5px 11px;border-radius:7px;margin-bottom:18px;\">BY YOUR BUILDING + THE COUNTERPARTY<\u002Fdiv>\n            <h3 style=\"font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;letter-spacing:-0.02em;margin-bottom:14px;\">Activation &amp; delivery<\u002Fh3>\n            <p style=\"font-size:16px;line-height:1.65;color:#4f5f59;margin-bottom:22px;max-width:560px;\">The pair goes live. The asset inside the area makes the corrective move; the matched asset outside makes the counter-move to hold balance. Delivery happens in the relevant 15-minute block and must be <strong>physically measurable at the meter<\u002Fstrong>.<\u002Fp>\n            <div style=\"display:flex;align-items:center;gap:14px;max-width:540px;\">\n              <div style=\"flex:1;padding:16px;background:#fbede0;border-radius:12px;text-align:center;\"><div style=\"font-weight:700;font-size:14px;color:#d97b2e;\">Inside area<\u002Fdiv><div style=\"font-size:12.5px;color:#5f6f69;margin-top:3px;\">corrective action<\u002Fdiv><\u002Fdiv>\n              <svg width=\"34\" height=\"20\" viewBox=\"0 0 34 20\" fill=\"none\" stroke=\"#9fb0a8\" stroke-width=\"2\"><path d=\"M2 10 h26 M22 4 l7 6 -7 6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n              <div style=\"flex:1;padding:16px;background:#e6f3ed;border-radius:12px;text-align:center;\"><div style=\"font-weight:700;font-size:14px;color:#0c7d5a;\">Outside area<\u002Fdiv><div style=\"font-size:12.5px;color:#5f6f69;margin-top:3px;\">counter action<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"margin-top:20px;font-size:14px;color:#6b7a73;font-style:italic;\">Commitment becomes a real dispatch instruction you must follow.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ s7 }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"position:relative;animation:riseIn .4s ease;\">\n            <div style=\"display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.06em;color:#2c63a0;background:#e8eff6;padding:5px 11px;border-radius:7px;margin-bottom:18px;\">SETTLEMENT<\u002Fdiv>\n            <h3 style=\"font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;letter-spacing:-0.02em;margin-bottom:14px;\">Verified &amp; settled<\u002Fh3>\n            <p style=\"font-size:16px;line-height:1.65;color:#4f5f59;margin-bottom:22px;max-width:560px;\">Delivery is checked against metered data. Each participant is paid their <strong>bid price<\u002Fstrong>; the grid operator only pays the <strong>spread<\u002Fstrong> between the matched pair.<\u002Fp>\n            <div style=\"padding:18px 20px;background:#11201c;border-radius:13px;color:#e8ede9;max-width:560px;\">\n              <div style=\"font-size:14.5px;line-height:1.55;\">The cost is <strong style=\"color:#7fd3b3;\">socialised through regulated network tariffs<\u002Fstrong> — kept separate from the national wholesale electricity price. Solving a local wire problem stays a grid-system cost.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ IDCONS DIAGRAM ============ -->\n  <section data-screen-label=\"IDCONS Mechanism\" style=\"background: #f0f3ee; padding: 64px 30px; border-top: 1px solid #e3e8e2; border-bottom: 1px solid #e3e8e2;\">\n    <div style=\"max-width: 1140px; margin: 0 auto;\">\n      <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 0.08em; color: #0c7d5a; margin-bottom: 14px;\">05 / THE MECHANISM<\u002Fdiv>\n      <div style=\"display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:20px;margin-bottom:34px;\">\n        <h2 style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 36px; letter-spacing: -0.025em; line-height: 1.1; max-width: 600px;\">IDCONS, the Intraday Congestion Spread, in one picture.<\u002Fh2>\n        <div style=\"display:flex;gap:6px;background:#fff;padding:5px;border-radius:11px;border:1px solid #e3e8e2;\">\n          <button onclick=\"{{ setExport }}\" style=\"{{ tabExport }}\">Export congestion<\u002Fbutton>\n          <button onclick=\"{{ setImport }}\" style=\"{{ tabImport }}\">Import congestion<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:#fff;border:1px solid #e3e8e2;border-radius:20px;padding:40px;box-shadow:0 4px 24px rgba(17,32,28,0.05);\">\n        <div style=\"display:grid;grid-template-columns:1fr auto 1fr;gap:24px;align-items:center;\">\n          <!-- inside area -->\n          <div style=\"border:2px dashed #e8a565;border-radius:16px;padding:26px;background:#fdf6ef;position:relative;\">\n            <div style=\"position:absolute;top:-11px;left:20px;background:#d97b2e;color:#fff;font-family:'IBM Plex Mono',monospace;font-size:10.5px;font-weight:600;letter-spacing:0.05em;padding:4px 11px;border-radius:6px;\">INSIDE CONGESTED AREA<\u002Fdiv>\n            <div style=\"font-family:'Space Grotesk',sans-serif;font-size:19px;font-weight:700;margin-bottom:8px;margin-top:6px;\">{{ insideTitle }}<\u002Fdiv>\n            <div style=\"font-size:14.5px;line-height:1.55;color:#5f6f69;margin-bottom:16px;\">{{ insideDesc }}<\u002Fdiv>\n            <div style=\"display:inline-flex;align-items:center;gap:8px;padding:8px 14px;background:#fff;border:1px solid #f0d8c0;border-radius:9px;font-weight:600;font-size:14px;color:#d97b2e;\">\n              <span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;\">{{ insideTag }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- center: balance -->\n          <div style=\"display:flex;flex-direction:column;align-items:center;gap:10px;min-width:120px;\">\n            <svg width=\"120\" height=\"64\" viewBox=\"0 0 120 64\" fill=\"none\">\n              <path d=\"M8 20 H112\" stroke=\"#d97b2e\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-dasharray=\"6 6\" style=\"animation: flowPulse 1s linear infinite;\"><\u002Fpath>\n              <path d=\"M112 44 H8\" stroke=\"#0c7d5a\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-dasharray=\"6 6\" style=\"animation: flowPulse 1s linear infinite;\"><\u002Fpath>\n              <path d=\"M100 13 l10 7 -10 7\" stroke=\"#d97b2e\" stroke-width=\"2.5\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n              <path d=\"M20 37 l-10 7 10 7\" stroke=\"#0c7d5a\" stroke-width=\"2.5\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n            <\u002Fsvg>\n            <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;color:#8a978f;letter-spacing:0.05em;text-align:center;\">EQUAL &amp; OPPOSITE<br>NET ENERGY = 0<\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- outside area -->\n          <div style=\"border:2px dashed #7fbfa3;border-radius:16px;padding:26px;background:#f1f8f4;position:relative;\">\n            <div style=\"position:absolute;top:-11px;left:20px;background:#0c7d5a;color:#fff;font-family:'IBM Plex Mono',monospace;font-size:10.5px;font-weight:600;letter-spacing:0.05em;padding:4px 11px;border-radius:6px;\">OUTSIDE THE AREA<\u002Fdiv>\n            <div style=\"font-family:'Space Grotesk',sans-serif;font-size:19px;font-weight:700;margin-bottom:8px;margin-top:6px;\">{{ outsideTitle }}<\u002Fdiv>\n            <div style=\"font-size:14.5px;line-height:1.55;color:#5f6f69;margin-bottom:16px;\">{{ outsideDesc }}<\u002Fdiv>\n            <div style=\"display:inline-flex;align-items:center;gap:8px;padding:8px 14px;background:#fff;border:1px solid #c7e3d6;border-radius:9px;font-weight:600;font-size:14px;color:#0c7d5a;\">\n              <span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;\">{{ outsideTag }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"margin-top:28px;padding:18px 22px;background:#f6f8f5;border-radius:13px;text-align:center;\">\n          <span style=\"font-size:15px;color:#11201c;\">Grid operator pays only the <strong style=\"color:#0c7d5a;\">spread<\u002Fstrong> between the two bid prices — the minimum needed to make the pair executable.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- 4 properties -->\n      <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:24px;\">\n        <div style=\"background:#fff;border:1px solid #e3e8e2;border-radius:14px;padding:20px;\">\n          <div style=\"font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;margin-bottom:6px;color:#0c7d5a;\">Location-aware<\u002Fdiv>\n          <div style=\"font-size:13px;line-height:1.5;color:#5f6f69;\">The EAN code ties every order to a real grid connection.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e3e8e2;border-radius:14px;padding:20px;\">\n          <div style=\"font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;margin-bottom:6px;color:#0c7d5a;\">Balanced<\u002Fdiv>\n          <div style=\"font-size:13px;line-height:1.5;color:#5f6f69;\">Every action is matched by an opposite one elsewhere.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e3e8e2;border-radius:14px;padding:20px;\">\n          <div style=\"font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;margin-bottom:6px;color:#0c7d5a;\">Pay-as-bid<\u002Fdiv>\n          <div style=\"font-size:13px;line-height:1.5;color:#5f6f69;\">Not a single uniform clearing price — each side is paid its bid.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e3e8e2;border-radius:14px;padding:20px;\">\n          <div style=\"font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;margin-bottom:6px;color:#0c7d5a;\">Congestion-specific<\u002Fdiv>\n          <div style=\"font-size:13px;line-height:1.5;color:#5f6f69;\">Value comes from <em>where<\u002Fem> you're connected, not generic flex.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ ROLES ============ -->\n  <section id=\"roles\" data-screen-label=\"Market Roles\" style=\"max-width: 1140px; margin: 0 auto; padding: 64px 30px 40px;\">\n    <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 0.08em; color: #0c7d5a; margin-bottom: 14px;\">06 / WHO DOES WHAT<\u002Fdiv>\n    <h2 style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 38px; letter-spacing: -0.025em; line-height: 1.08; margin-bottom: 14px;\">Four roles. Clear separation of duty.<\u002Fh2>\n    <p style=\"font-size: 16px; line-height: 1.6; color: #4f5f59; max-width: 640px; margin-bottom: 34px;\">GOPACS coordinates — it doesn't replace the legal and operational roles that already exist. The key split for you: physical flexibility vs. contractual accountability.<\u002Fp>\n\n    <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:16px;\">\n      <div style=\"background:#fff;border:1px solid #e3e8e2;border-radius:16px;padding:26px;box-shadow:0 1px 2px rgba(17,32,28,0.03);\">\n        <div style=\"width:40px;height:40px;border-radius:11px;background:#e8eff6;display:flex;align-items:center;justify-content:center;margin-bottom:18px;\">\n          <svg width=\"21\" height=\"21\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#2c63a0\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M22 12h-4l-3 9L9 3l-3 9H2\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#2c63a0;letter-spacing:0.05em;margin-bottom:6px;\">THE BUYER<\u002Fdiv>\n        <h3 style=\"font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;margin-bottom:8px;\">Grid operators<\u002Fh3>\n        <div style=\"font-size:13px;color:#8a978f;margin-bottom:12px;\">TenneT + 6 DSOs<\u002Fdiv>\n        <p style=\"font-size:13.5px;line-height:1.55;color:#5f6f69;\">Identify congestion, define the area &amp; window, issue the request, validate the result, and pay the spread.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#11201c;border:1px solid #11201c;border-radius:16px;padding:26px;box-shadow:0 6px 24px rgba(17,32,28,0.12);color:#e8ede9;\">\n        <div style=\"width:40px;height:40px;border-radius:11px;background:rgba(127,211,179,0.15);display:flex;align-items:center;justify-content:center;margin-bottom:18px;\">\n          <svg width=\"21\" height=\"21\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#7fd3b3\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M16 3h5v5M21 3l-7 7M8 21H3v-5M3 21l7-7\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#7fd3b3;letter-spacing:0.05em;margin-bottom:6px;\">THE INTERMEDIARY<\u002Fdiv>\n        <h3 style=\"font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;margin-bottom:8px;color:#fff;\">CSP<\u002Fh3>\n        <div style=\"font-size:13px;color:#9fb0a8;margin-bottom:12px;\">Congestion Service Provider<\u002Fdiv>\n        <p style=\"font-size:13.5px;line-height:1.55;color:#c3d0c9;\">Aggregates assets, submits location-aware bids, <strong style=\"color:#fff;\">holds the firm contract<\u002Fstrong>, and carries the delivery obligation &amp; settlement.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#fff;border:1.5px solid #cce5da;border-radius:16px;padding:26px;box-shadow:0 1px 2px rgba(17,32,28,0.03);position:relative;\">\n        <div style=\"position:absolute;top:16px;right:16px;font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:#0c7d5a;background:#e6f3ed;padding:3px 8px;border-radius:5px;\">THAT'S YOU<\u002Fdiv>\n        <div style=\"width:40px;height:40px;border-radius:11px;background:#e6f3ed;display:flex;align-items:center;justify-content:center;margin-bottom:18px;\">\n          <svg width=\"21\" height=\"21\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#0c7d5a\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 21h18M5 21V7l8-4v18M19 21V11l-6-4\"><\u002Fpath><path d=\"M9 9v.01M9 12v.01M9 15v.01\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#0c7d5a;letter-spacing:0.05em;margin-bottom:6px;\">THE FLEXIBILITY<\u002Fdiv>\n        <h3 style=\"font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;margin-bottom:8px;\">Buildings &amp; assets<\u002Fh3>\n        <div style=\"font-size:13px;color:#8a978f;margin-bottom:12px;\">HVAC, battery, EV, PV, industry<\u002Fdiv>\n        <p style=\"font-size:13.5px;line-height:1.55;color:#5f6f69;\">Control the physical capability and deliver the instructed change — usually <strong>via a CSP<\u002Fstrong>, not holding the grid contract directly.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid #e3e8e2;border-radius:16px;padding:26px;box-shadow:0 1px 2px rgba(17,32,28,0.03);\">\n        <div style=\"width:40px;height:40px;border-radius:11px;background:#f1f4f0;display:flex;align-items:center;justify-content:center;margin-bottom:18px;\">\n          <svg width=\"21\" height=\"21\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#5f6f69\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 12a9 9 0 1 1-6.219-8.56\"><\u002Fpath><path d=\"M12 7v5l3 3\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#5f6f69;letter-spacing:0.05em;margin-bottom:6px;\">THE BALANCE INTERFACE<\u002Fdiv>\n        <h3 style=\"font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;margin-bottom:8px;\">BRP<\u002Fh3>\n        <div style=\"font-size:13px;color:#8a978f;margin-bottom:12px;\">Balance Responsible Party<\u002Fdiv>\n        <p style=\"font-size:13.5px;line-height:1.55;color:#5f6f69;\">Activating flex shifts your market position — so the BRP must stay coordinated even though GOPACS solves congestion, not balance.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ CONTRACTS ============ -->\n  <section id=\"contracts\" data-screen-label=\"Contract Types\" style=\"max-width: 1140px; margin: 0 auto; padding: 56px 30px 40px;\">\n    <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 0.08em; color: #0c7d5a; margin-bottom: 14px;\">07 / THE CONTRACTS<\u002Fdiv>\n    <h2 style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 38px; letter-spacing: -0.025em; line-height: 1.08; margin-bottom: 14px;\">Six products, grouped by how firmly you commit.<\u002Fh2>\n    <p style=\"font-size: 16px; line-height: 1.6; color: #4f5f59; max-width: 660px; margin-bottom: 16px;\">The same asset can support different products depending on how predictably it can deliver. Two big families:<\u002Fp>\n\n    <div style=\"display:flex;gap:16px;margin-bottom:32px;flex-wrap:wrap;\">\n      <div style=\"display:flex;align-items:center;gap:10px;padding:10px 16px;background:#fbede0;border-radius:10px;\">\n        <span style=\"width:10px;height:10px;border-radius:3px;background:#d97b2e;\"><\u002Fspan>\n        <span style=\"font-size:14px;\"><strong style=\"font-family:'Space Grotesk',sans-serif;\">Limiting<\u002Fstrong> — caps or reduces import (passive)<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:10px;padding:10px 16px;background:#e6f3ed;border-radius:10px;\">\n        <span style=\"width:10px;height:10px;border-radius:3px;background:#0c7d5a;\"><\u002Fspan>\n        <span style=\"font-size:14px;\"><strong style=\"font-family:'Space Grotesk',sans-serif;\">Steering<\u002Fstrong> — actively moves assets up <em>and<\u002Fem> down<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:16px;\">\n      <!-- CLC-T -->\n      <div style=\"background:#fff;border:1px solid #e3e8e2;border-top:3px solid #d97b2e;border-radius:14px;padding:24px;box-shadow:0 1px 2px rgba(17,32,28,0.03);\">\n        <div style=\"display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;\">\n          <h3 style=\"font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;\">CLC-T<\u002Fh3>\n          <span style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;color:#d97b2e;background:#fbede0;padding:4px 9px;border-radius:6px;letter-spacing:0.04em;\">LIMITING<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font-size:14px;font-weight:600;color:#11201c;margin-bottom:6px;\">Capacity Limiting — fixed windows<\u002Fdiv>\n        <p style=\"font-size:13.5px;line-height:1.55;color:#5f6f69;margin-bottom:14px;\">Down-flex during recurring scheduled intervals.<\u002Fp>\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;color:#8a978f;letter-spacing:0.04em;margin-bottom:6px;\">BEST FOR<\u002Fdiv>\n        <div style=\"font-size:13px;color:#11201c;\">HVAC curtailment, predictable process shifts<\u002Fdiv>\n      <\u002Fdiv>\n      <!-- CLC-A -->\n      <div style=\"background:#fff;border:1px solid #e3e8e2;border-top:3px solid #d97b2e;border-radius:14px;padding:24px;box-shadow:0 1px 2px rgba(17,32,28,0.03);\">\n        <div style=\"display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;\">\n          <h3 style=\"font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;\">CLC-A<\u002Fh3>\n          <span style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;color:#d97b2e;background:#fbede0;padding:4px 9px;border-radius:6px;letter-spacing:0.04em;\">LIMITING<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font-size:14px;font-weight:600;color:#11201c;margin-bottom:6px;\">Capacity Limiting — on-call<\u002Fdiv>\n        <p style=\"font-size:13.5px;line-height:1.55;color:#5f6f69;margin-bottom:14px;\">Stay ready for day-ahead activation triggers.<\u002Fp>\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;color:#8a978f;letter-spacing:0.04em;margin-bottom:6px;\">BEST FOR<\u002Fdiv>\n        <div style=\"font-size:13px;color:#11201c;\">Assets serving irregular limiting requests<\u002Fdiv>\n      <\u002Fdiv>\n      <!-- CSC-T -->\n      <div style=\"background:#fff;border:1px solid #e3e8e2;border-top:3px solid #0c7d5a;border-radius:14px;padding:24px;box-shadow:0 1px 2px rgba(17,32,28,0.03);\">\n        <div style=\"display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;\">\n          <h3 style=\"font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;\">CSC-T<\u002Fh3>\n          <span style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;color:#0c7d5a;background:#e6f3ed;padding:4px 9px;border-radius:6px;letter-spacing:0.04em;\">STEERING<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font-size:14px;font-weight:600;color:#11201c;margin-bottom:6px;\">Capacity Steering — fixed windows<\u002Fdiv>\n        <p style=\"font-size:13.5px;line-height:1.55;color:#5f6f69;margin-bottom:14px;\">Bidirectional power control in defined blocks.<\u002Fp>\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;color:#8a978f;letter-spacing:0.04em;margin-bottom:6px;\">BEST FOR<\u002Fdiv>\n        <div style=\"font-size:13px;color:#11201c;\">Batteries, EVs, PV, high-headroom HVAC<\u002Fdiv>\n      <\u002Fdiv>\n      <!-- CSC-A -->\n      <div style=\"background:#fff;border:1px solid #e3e8e2;border-top:3px solid #0c7d5a;border-radius:14px;padding:24px;box-shadow:0 1px 2px rgba(17,32,28,0.03);\">\n        <div style=\"display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;\">\n          <h3 style=\"font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;\">CSC-A<\u002Fh3>\n          <span style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;color:#0c7d5a;background:#e6f3ed;padding:4px 9px;border-radius:6px;letter-spacing:0.04em;\">STEERING<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font-size:14px;font-weight:600;color:#11201c;margin-bottom:6px;\">Capacity Steering — on-call<\u002Fdiv>\n        <p style=\"font-size:13.5px;line-height:1.55;color:#5f6f69;margin-bottom:14px;\">Dynamic steering, available for dispatch at peaks.<\u002Fp>\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;color:#8a978f;letter-spacing:0.04em;margin-bottom:6px;\">BEST FOR<\u002Fdiv>\n        <div style=\"font-size:13px;color:#11201c;\">Fully dispatchable, bidirectional storage/industry<\u002Fdiv>\n      <\u002Fdiv>\n      <!-- Mandatory -->\n      <div style=\"background:#fff;border:1px solid #e3e8e2;border-top:3px solid #2c63a0;border-radius:14px;padding:24px;box-shadow:0 1px 2px rgba(17,32,28,0.03);\">\n        <div style=\"display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;\">\n          <h3 style=\"font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;\">Mandatory bidding<\u002Fh3>\n          <span style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;color:#2c63a0;background:#e8eff6;padding:4px 9px;border-radius:6px;letter-spacing:0.04em;\">OBLIGATION<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font-size:14px;font-weight:600;color:#11201c;margin-bottom:6px;\">Obligatory market participation<\u002Fdiv>\n        <p style=\"font-size:13.5px;line-height:1.55;color:#5f6f69;margin-bottom:14px;\">Submit standing offers whenever congestion is forecast.<\u002Fp>\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;color:#8a978f;letter-spacing:0.04em;margin-bottom:6px;\">BEST FOR<\u002Fdiv>\n        <div style=\"font-size:13px;color:#11201c;\">Entities able to bid consistently &amp; structurally<\u002Fdiv>\n      <\u002Fdiv>\n      <!-- Redispatch -->\n      <div style=\"background:#fff;border:1px solid #e3e8e2;border-top:3px solid #2c63a0;border-radius:14px;padding:24px;box-shadow:0 1px 2px rgba(17,32,28,0.03);\">\n        <div style=\"display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;\">\n          <h3 style=\"font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;\">Redispatch / IDCONS<\u002Fh3>\n          <span style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;color:#2c63a0;background:#e8eff6;padding:4px 9px;border-radius:6px;letter-spacing:0.04em;\">VOLUNTARY<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font-size:14px;font-weight:600;color:#11201c;margin-bottom:6px;\">Voluntary intraday redispatch<\u002Fdiv>\n        <p style=\"font-size:13.5px;line-height:1.55;color:#5f6f69;margin-bottom:14px;\">Paired market actions for locational price spreads.<\u002Fp>\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;color:#8a978f;letter-spacing:0.04em;margin-bottom:6px;\">BEST FOR<\u002Fdiv>\n        <div style=\"font-size:13px;color:#11201c;\">Fast assets optimised for intraday flow changes<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top:18px;font-size:13.5px;color:#8a978f;display:flex;align-items:center;gap:8px;\">\n      <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#8a978f\" stroke-width=\"2\" stroke-linecap=\"round\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M12 16v-4M12 8h.01\"><\u002Fpath><\u002Fsvg>\n      <span><strong>TDTR<\u002Fstrong> (Time-Duration Transport Right) is a TenneT high-voltage product, contracted directly — outside the DSO building-level scope here.<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ NEGOFLEX USE CASES ============ -->\n  <section id=\"negoflex\" data-screen-label=\"NegoFlex Use Cases\" style=\"background: #11201c; color: #e8ede9; padding: 64px 30px;\">\n    <div style=\"max-width: 1140px; margin: 0 auto;\">\n      <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 0.08em; color: #7fd3b3; margin-bottom: 14px;\">08 / YOUR BUILDING<\u002Fdiv>\n      <h2 style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 38px; letter-spacing: -0.025em; line-height: 1.08; color:#fff; margin-bottom: 14px; max-width:740px;\">NegoFlex turns comfort-bound assets into reliable GOPACS contributions.<\u002Fh2>\n      <p style=\"font-size: 16px; line-height: 1.6; color: #9fb0a8; max-width: 640px; margin-bottom: 32px;\">No new market roles. The DSO still declares congestion, the CSP still holds the contract, your building stays comfort-driven. NegoFlex just makes your flexibility dependable. Which contracts fit depends on what you've got.<\u002Fp>\n\n      <div style=\"display:flex;gap:8px;margin-bottom:28px;background:rgba(255,255,255,0.05);padding:6px;border-radius:13px;width:fit-content;\">\n        <button onclick=\"{{ setHvac }}\" style=\"{{ negoTabHvac }}\">HVAC-only office<\u002Fbutton>\n        <button onclick=\"{{ setMulti }}\" style=\"{{ negoTabMulti }}\">Multi-asset building<\u002Fbutton>\n      <\u002Fdiv>\n\n      <!-- HVAC PANEL -->\n      <sc-if value=\"{{ negoHvac }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"animation:riseIn .4s ease;\">\n          <div style=\"display:grid;grid-template-columns:0.9fr 1.1fr;gap:28px;align-items:start;\">\n            <div style=\"background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:28px;\">\n              <div style=\"font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;color:#fff;margin-bottom:8px;\">A heat-pump office<\u002Fdiv>\n              <p style=\"font-size:14.5px;line-height:1.6;color:#9fb0a8;margin-bottom:20px;\">Already price-optimised. Willing to help — as long as comfort stays at 21 ± 1 °C. The flex is slow and comfort-bound, but predictable.<\u002Fp>\n              <div style=\"display:flex;flex-direction:column;gap:10px;\">\n                <div style=\"display:flex;gap:12px;align-items:flex-start;padding:14px;background:rgba(217,123,46,0.12);border-radius:11px;\">\n                  <span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;color:#f0a866;flex-shrink:0;margin-top:1px;\">DOWN<\u002Fspan>\n                  <span style=\"font-size:13.5px;line-height:1.5;color:#d8e0db;\">Coast heating/cooling through a peak to cut consumption.<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"display:flex;gap:12px;align-items:flex-start;padding:14px;background:rgba(12,125,90,0.15);border-radius:11px;\">\n                  <span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;color:#7fd3b3;flex-shrink:0;margin-top:1px;\">UP<\u002Fspan>\n                  <span style=\"font-size:13.5px;line-height:1.5;color:#d8e0db;\">Pre-heat / pre-cool earlier to soak up solar export peaks.<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div>\n              <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;color:#7fd3b3;letter-spacing:0.05em;margin-bottom:14px;\">CONTRACT FIT<\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:8px;\">\n                <div style=\"display:flex;align-items:center;gap:14px;padding:14px 18px;background:rgba(255,255,255,0.04);border-radius:11px;\">\n                  <span style=\"width:80px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;color:#fff;flex-shrink:0;\">CLC-T<\u002Fspan>\n                  <span style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;color:#7fd3b3;background:rgba(127,211,179,0.15);padding:4px 9px;border-radius:6px;flex-shrink:0;width:88px;text-align:center;\">GOOD FIT<\u002Fspan>\n                  <span style=\"font-size:13px;line-height:1.45;color:#9fb0a8;\">Recurrent windows; coast to cap import reliably.<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:14px;padding:14px 18px;background:rgba(255,255,255,0.04);border-radius:11px;\">\n                  <span style=\"width:80px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;color:#fff;flex-shrink:0;\">CLC-A<\u002Fspan>\n                  <span style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;color:#7fd3b3;background:rgba(127,211,179,0.15);padding:4px 9px;border-radius:6px;flex-shrink:0;width:88px;text-align:center;\">GOOD FIT<\u002Fspan>\n                  <span style=\"font-size:13px;line-height:1.45;color:#9fb0a8;\">Only constrained when the DSO actually calls.<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:14px;padding:14px 18px;background:rgba(255,255,255,0.04);border-radius:11px;\">\n                  <span style=\"width:80px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;color:#fff;flex-shrink:0;\">CSC-A<\u002Fspan>\n                  <span style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;color:#f0c987;background:rgba(240,201,135,0.15);padding:4px 9px;border-radius:6px;flex-shrink:0;width:88px;text-align:center;\">USEFUL<\u002Fspan>\n                  <span style=\"font-size:13px;line-height:1.45;color:#9fb0a8;\">Up-flex (pre-cool) for solar export days.<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:14px;padding:14px 18px;background:rgba(255,255,255,0.04);border-radius:11px;\">\n                  <span style=\"width:80px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;color:#fff;flex-shrink:0;\">CSC-T<\u002Fspan>\n                  <span style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;color:#f0c987;background:rgba(240,201,135,0.15);padding:4px 9px;border-radius:6px;flex-shrink:0;width:88px;text-align:center;\">CONDITIONAL<\u002Fspan>\n                  <span style=\"font-size:13px;line-height:1.45;color:#9fb0a8;\">Only if thermal behaviour is very predictable.<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:14px;padding:14px 18px;background:rgba(255,255,255,0.04);border-radius:11px;\">\n                  <span style=\"width:80px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;color:#fff;flex-shrink:0;\">Redispatch<\u002Fspan>\n                  <span style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;color:#f0c987;background:rgba(240,201,135,0.15);padding:4px 9px;border-radius:6px;flex-shrink:0;width:88px;text-align:center;\">PARTIAL<\u002Fspan>\n                  <span style=\"font-size:13px;line-height:1.45;color:#9fb0a8;\">Long windows only — too slow alone for fast events.<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:14px;padding:14px 18px;background:rgba(255,255,255,0.04);border-radius:11px;\">\n                  <span style=\"width:80px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;color:#fff;flex-shrink:0;\">Mandatory<\u002Fspan>\n                  <span style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;color:#e89a9a;background:rgba(232,154,154,0.15);padding:4px 9px;border-radius:6px;flex-shrink:0;width:88px;text-align:center;\">NOT ALONE<\u002Fspan>\n                  <span style=\"font-size:13px;line-height:1.45;color:#9fb0a8;\">Comfort flex is probabilistic — shortfall risk too high.<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"margin-top:24px;\">\n            <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;color:#7fd3b3;letter-spacing:0.05em;margin-bottom:14px;\">WORKED EXAMPLES<\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:14px;\">\n              <div style=\"background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:20px;\">\n                <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#f0a866;margin-bottom:8px;\">CLC-T · WINTER AM<\u002Fdiv>\n                <div style=\"font-family:'Space Grotesk',sans-se
