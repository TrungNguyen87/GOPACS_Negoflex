rif;font-size:15px;font-weight:600;color:#fff;margin-bottom:8px;\">Morning import peak<\u002Fdiv>\n                <p style=\"font-size:13px;line-height:1.5;color:#9fb0a8;\">07:30–09:30 import congestion. Pre-heat 06:30–07:30, then coast 30 kW below the cap — comfort intact.<\u002Fp>\n              <\u002Fdiv>\n              <div style=\"background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:20px;\">\n                <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#7fd3b3;margin-bottom:8px;\">CSC-A · SUMMER NOON<\u002Fdiv>\n                <div style=\"font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;color:#fff;margin-bottom:8px;\">Solar export peak<\u002Fdiv>\n                <p style=\"font-size:13px;line-height:1.5;color:#9fb0a8;\">11:00–13:00 PV export. On called days, pre-cool by 1 °C to absorb energy and relieve the feeder.<\u002Fp>\n              <\u002Fdiv>\n              <div style=\"background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:20px;\">\n                <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#f0a866;margin-bottom:8px;\">CLC-A · IRREGULAR PM<\u002Fdiv>\n                <div style=\"font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;color:#fff;margin-bottom:8px;\">Evening event load<\u002Fdiv>\n                <p style=\"font-size:13px;line-height:1.5;color:#9fb0a8;\">Infrequent 18:00–20:00 congestion. Shift heating earlier and coast — only on the days the DSO calls.<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- MULTI PANEL -->\n      <sc-if value=\"{{ negoMulti }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"animation:riseIn .4s ease;\">\n          <div style=\"display:grid;grid-template-columns:0.9fr 1.1fr;gap:28px;align-items:start;\">\n            <div style=\"background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:28px;\">\n              <div style=\"font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;color:#fff;margin-bottom:8px;\">HVAC + battery + EV + PV<\u002Fdiv>\n              <p style=\"font-size:14.5px;line-height:1.6;color:#9fb0a8;margin-bottom:20px;\">A campus with a 50 kW / 150 kWh battery, EV cluster and rooftop solar. Fast, firm, two-directional — a strong fit for the <em>full<\u002Fem> contract menu.<\u002Fp>\n              <div style=\"display:flex;flex-direction:column;gap:10px;\">\n                <div style=\"display:flex;gap:12px;align-items:flex-start;padding:14px;background:rgba(12,125,90,0.15);border-radius:11px;\">\n                  <span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;color:#7fd3b3;flex-shrink:0;margin-top:1px;\">FAST<\u002Fspan>\n                  <span style=\"font-size:13.5px;line-height:1.5;color:#d8e0db;\">Battery &amp; EVs give firm up/down flex at short notice.<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"display:flex;gap:12px;align-items:flex-start;padding:14px;background:rgba(255,255,255,0.06);border-radius:11px;\">\n                  <span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;color:#cdddf0;flex-shrink:0;margin-top:1px;\">SLOW<\u002Fspan>\n                  <span style=\"font-size:13.5px;line-height:1.5;color:#d8e0db;\">HVAC adds support; PV curtails to modulate export.<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div>\n              <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;color:#7fd3b3;letter-spacing:0.05em;margin-bottom:14px;\">CONTRACT FIT<\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:8px;\">\n                <div style=\"display:flex;align-items:center;gap:14px;padding:14px 18px;background:rgba(255,255,255,0.04);border-radius:11px;\">\n                  <span style=\"width:80px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;color:#fff;flex-shrink:0;\">CSC-T<\u002Fspan>\n                  <span style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;color:#7fd3b3;background:rgba(127,211,179,0.18);padding:4px 9px;border-radius:6px;flex-shrink:0;width:88px;text-align:center;\">VERY STRONG<\u002Fspan>\n                  <span style=\"font-size:13px;line-height:1.45;color:#9fb0a8;\">Firm ±50 kW steering profile in predictable windows.<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:14px;padding:14px 18px;background:rgba(255,255,255,0.04);border-radius:11px;\">\n                  <span style=\"width:80px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;color:#fff;flex-shrink:0;\">Redispatch<\u002Fspan>\n                  <span style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;color:#7fd3b3;background:rgba(127,211,179,0.18);padding:4px 9px;border-radius:6px;flex-shrink:0;width:88px;text-align:center;\">EXCELLENT<\u002Fspan>\n                  <span style=\"font-size:13px;line-height:1.45;color:#9fb0a8;\">Battery/EV are ideal for fast intraday IDCONS.<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:14px;padding:14px 18px;background:rgba(255,255,255,0.04);border-radius:11px;\">\n                  <span style=\"width:80px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;color:#fff;flex-shrink:0;\">CSC-A<\u002Fspan>\n                  <span style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;color:#7fd3b3;background:rgba(127,211,179,0.15);padding:4px 9px;border-radius:6px;flex-shrink:0;width:88px;text-align:center;\">STRONG<\u002Fspan>\n                  <span style=\"font-size:13px;line-height:1.45;color:#9fb0a8;\">Quick response to short-notice solar-event calls.<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:14px;padding:14px 18px;background:rgba(255,255,255,0.04);border-radius:11px;\">\n                  <span style=\"width:80px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;color:#fff;flex-shrink:0;\">CLC-T / A<\u002Fspan>\n                  <span style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;color:#f0c987;background:rgba(240,201,135,0.15);padding:4px 9px;border-radius:6px;flex-shrink:0;width:88px;text-align:center;\">GOOD<\u002Fspan>\n                  <span style=\"font-size:13px;line-height:1.45;color:#9fb0a8;\">Reliable, but limiting-only underuses the battery.<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:14px;padding:14px 18px;background:rgba(255,255,255,0.04);border-radius:11px;\">\n                  <span style=\"width:80px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;color:#fff;flex-shrink:0;\">Mandatory<\u002Fspan>\n                  <span style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;color:#f0c987;background:rgba(240,201,135,0.15);padding:4px 9px;border-radius:6px;flex-shrink:0;width:88px;text-align:center;\">POSSIBLE<\u002Fspan>\n                  <span style=\"font-size:13px;line-height:1.45;color:#9fb0a8;\">Feasible if firm capacity is conservatively sized.<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"margin-top:24px;\">\n            <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;color:#7fd3b3;letter-spacing:0.05em;margin-bottom:14px;\">WORKED EXAMPLES<\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:14px;\">\n              <div style=\"background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:18px;\">\n                <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;color:#7fd3b3;margin-bottom:8px;\">CSC-T<\u002Fdiv>\n                <div style=\"font-family:'Space Grotesk',sans-serif;font-size:14.5px;font-weight:600;color:#fff;margin-bottom:7px;\">Evening steering<\u002Fdiv>\n                <p style=\"font-size:12.5px;line-height:1.45;color:#9fb0a8;\">17:00–20:00: pre-charge battery to discharge 50 kW, shift EV charging, mild pre-heat.<\u002Fp>\n              <\u002Fdiv>\n              <div style=\"background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:18px;\">\n                <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;color:#7fd3b3;margin-bottom:8px;\">CSC-A + IDCONS<\u002Fdiv>\n                <div style=\"font-family:'Space Grotesk',sans-serif;font-size:14.5px;font-weight:600;color:#fff;margin-bottom:7px;\">Solar export<\u002Fdiv>\n                <p style=\"font-size:12.5px;line-height:1.45;color:#9fb0a8;\">11:00–14:00: ramp battery &amp; EV charging, pre-cool, curtail PV; pair buy-in / sell-out.<\u002Fp>\n              <\u002Fdiv>\n              <div style=\"background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:18px;\">\n                <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;color:#f0c987;margin-bottom:8px;\">MANDATORY · 1 MW<\u002Fdiv>\n                <div style=\"font-family:'Space Grotesk',sans-serif;font-size:14.5px;font-weight:600;color:#fff;margin-bottom:7px;\">Portfolio bidding<\u002Fdiv>\n                <p style=\"font-size:12.5px;line-height:1.45;color:#9fb0a8;\">NegoFlex caps the bid at the 90%-reliable firm volume, keeping buffers for contingencies.<\u002Fp>\n              <\u002Fdiv>\n              <div style=\"background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:18px;\">\n                <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;color:#7fd3b3;margin-bottom:8px;\">IDCONS-ONLY<\u002Fdiv>\n                <div style=\"font-family:'Space Grotesk',sans-serif;font-size:14.5px;font-weight:600;color:#fff;margin-bottom:7px;\">No commitment<\u002Fdiv>\n                <p style=\"font-size:12.5px;line-height:1.45;color:#9fb0a8;\">Voluntary bids only when spare flex exists — optionality over stability, good for pilots.<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ TAKEAWAY ============ -->\n  <section data-screen-label=\"Takeaway\" style=\"max-width: 1140px; margin: 0 auto; padding: 72px 30px 80px; text-align: center;\">\n    <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 0.08em; color: #0c7d5a; margin-bottom: 18px;\">THE BOTTOM LINE<\u002Fdiv>\n    <h2 style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 40px; letter-spacing: -0.03em; line-height: 1.08; max-width: 760px; margin: 0 auto 22px; text-wrap: balance;\">Value isn't just how many kilowatts you have — it's <span style=\"color:#0c7d5a;\">where, when, and how reliably<\u002Fspan> you can deliver them.<\u002Fh2>\n    <p style=\"font-size: 17px; line-height: 1.6; color: #4f5f59; max-width: 600px; margin: 0 auto 40px; text-wrap: pretty;\">GOPACS pays for flexibility that's valuable because of its location relative to a bottleneck. Pick the contract that matches how firmly your building can commit — and let the market do the rest.<\u002Fp>\n    <div style=\"display:flex;gap:14px;justify-content:center;flex-wrap:wrap;\">\n      <a href=\"#problem\" style=\"text-decoration:none;padding:13px 26px;background:#0c7d5a;color:#fff;border-radius:11px;font-weight:600;font-size:15px;box-shadow:0 4px 16px rgba(12,125,90,0.25);\">Back to the top<\u002Fa>\n      <a href=\"#process\" style=\"text-decoration:none;padding:13px 26px;background:#fff;color:#11201c;border:1px solid #dde3dc;border-radius:11px;font-weight:600;font-size:15px;\">Replay the 7 steps<\u002Fa>\n    <\u002Fdiv>\n    <div style=\"margin-top:56px;padding-top:28px;border-top:1px solid #e3e8e2;font-size:12.5px;color:#9aa69f;font-family:'IBM Plex Mono',monospace;letter-spacing:0.03em;\">GOPACS · GRID OPERATORS PLATFORM FOR ANCILLARY SERVICES — CUSTOMER EXPLAINER<\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { step: 1, idcons: 'export', nego: 'hvac' };\n\n  navStyle(n) {\n    const active = this.state.step === n;\n    const base = 'display:flex;align-items:center;width:100%;padding:14px 16px;border-radius:11px;cursor:pointer;transition:all .18s ease;border:1px solid ';\n    return active\n      ? base + '#0c7d5a;background:#0c7d5a;color:#ffffff;box-shadow:0 4px 14px rgba(12,125,90,0.22);'\n      : base + '#e3e8e2;background:#ffffff;color:#11201c;';\n  }\n\n  pillStyle(active, light) {\n    const base = 'padding:9px 16px;border-radius:8px;cursor:pointer;font-weight:600;font-size:13.5px;font-family:DM Sans,sans-serif;border:none;transition:all .18s ease;';\n    if (light) {\n      return active\n        ? base + 'background:#0c7d5a;color:#fff;'\n        : base + 'background:transparent;color:#5f6f69;';\n    }\n    return active\n      ? base + 'background:#0c7d5a;color:#fff;'\n      : base + 'background:transparent;color:#9fb0a8;';\n  }\n\n  renderVals() {\n    const exp = this.state.idcons === 'export';\n    return {\n      step: this.state.step,\n      s1: this.state.step === 1, s2: this.state.step === 2, s3: this.state.step === 3,\n      s4: this.state.step === 4, s5: this.state.step === 5, s6: this.state.step === 6,\n      s7: this.state.step === 7,\n      go1: () => this.setState({ step: 1 }), go2: () => this.setState({ step: 2 }),\n      go3: () => this.setState({ step: 3 }), go4: () => this.setState({ step: 4 }),\n      go5: () => this.setState({ step: 5 }), go6: () => this.setState({ step: 6 }),\n      go7: () => this.setState({ step: 7 }),\n      nav1: this.navStyle(1), nav2: this.navStyle(2), nav3: this.navStyle(3),\n      nav4: this.navStyle(4), nav5: this.navStyle(5), nav6: this.navStyle(6),\n      nav7: this.navStyle(7),\n\n      setExport: () => this.setState({ idcons: 'export' }),\n      setImport: () => this.setState({ idcons: 'import' }),\n      tabExport: this.pillStyle(exp, true),\n      tabImport: this.pillStyle(!exp, true),\n      insideTitle: exp ? 'Consume more' : 'Consume less',\n      insideDesc: exp\n        ? 'The feeder is full pushing power out. A building inside the area soaks up energy — pre-cools, charges a battery — to pull the local flow back under the limit.'\n        : 'The feeder is full pulling power in. A building inside the area reduces demand — coasts HVAC, defers EV charging — to ease the import overload.',\n      insideTag: exp ? 'BUY ORDER · ↑ DEMAND' : 'SELL ORDER · ↓ DEMAND',\n      outsideTitle: exp ? 'Generate / sell' : 'Consume / buy',\n      outsideDesc: exp\n        ? 'A matched asset outside the area sells the equal amount, so the country\\u2019s total energy balance is left completely unchanged.'\n        : 'A matched asset outside the area buys the equal amount, keeping the national energy balance unchanged while the local cable is relieved.',\n      outsideTag: exp ? 'SELL ORDER · COUNTER' : 'BUY ORDER · COUNTER',\n\n      setHvac: () => this.setState({ nego: 'hvac' }),\n      setMulti: () => this.setState({ nego: 'multi' }),\n      negoHvac: this.state.nego === 'hvac',\n      negoMulti: this.state.nego === 'multi',\n      negoTabHvac: this.pillStyle(this.state.nego === 'hvac', false),\n      negoTabMulti: this.pillStyle(this.state.nego === 'multi', false),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
